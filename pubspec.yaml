name: adaptive_scaffold_router
description: "Adaptive navigation scaffold for Material 3 — drop-in successor to flutter_adaptive_scaffold with first-class go_router support and state preservation."
version: 0.3.0
homepage: https://github.com/igloodev/adaptive_scaffold_router
repository: https://github.com/igloodev/adaptive_scaffold_router
issue_tracker: https://github.com/igloodev/adaptive_scaffold_router/issues

topics:
  - adaptive
  - responsive
  - navigation
  - material
  - go-router

screenshots:
  - description: "Phone width — a Material 3 bottom navigation bar."
    path: screenshots/01_phone.png
  - description: "Tablet width — a navigation rail."
    path: screenshots/02_tablet.png
  - description: "Desktop width — an extended navigation rail."
    path: screenshots/03_desktop.png

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: '>=10.0.0 <18.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
